<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealSync | Doctor Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

    <div class="min-h-screen flex">
        <!-- Sidebar -->
        <aside class="w-72 bg-white border-r border-slate-200 hidden md:flex flex-col">
            <div class="p-8">
                <h1 class="text-2xl font-bold text-teal-600 tracking-tight">HealSync</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Medical Professional</p>
            </div>
            
            <nav class="flex-1 px-4 space-y-1">
                <a th:href="@{/doctor/dashboard}" class="flex items-center px-4 py-3 text-sm font-medium text-slate-500 hover:bg-slate-50 hover:text-teal-600 rounded-2xl transition-all">
                    <span class="mr-3">📊</span> Overview
                </a>
                <a href="#" class="flex items-center px-4 py-3 text-sm font-medium text-slate-500 hover:bg-slate-50 hover:text-teal-600 rounded-2xl transition-all">
                    <span class="mr-3">👥</span> My Patients
                </a>
                <a href="#" class="flex items-center px-4 py-3 text-sm font-semibold bg-teal-50 text-teal-700 rounded-2xl">
                    <span class="mr-3">👤</span> Profile Settings
                </a>
            </nav>

            <div class="p-6 border-t border-slate-100">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="w-full flex items-center px-4 py-3 text-sm font-semibold text-rose-500 hover:bg-rose-50 rounded-2xl transition-all group">
                        <span class="mr-3 group-hover:rotate-12 transition-transform">📤</span> Sign Out
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <header class="px-10 py-8">
                <h2 class="text-3xl font-bold text-slate-800">Professional Profile</h2>
                <p class="text-slate-500 text-sm mt-1">Update your availability and professional credentials.</p>
            </header>

            <div class="px-10 pb-12">
                <div class="max-w-3xl">
                    <!-- Profile Form mapped to your Schema -->
                    <form th:action="@{/doctor/profile/update}" method="post" th:object="${doctor}">
                        
                        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 p-8 mb-8">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                
                                <!-- Full Name -->
                                <div class="md:col-span-2">
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Full Name</label>
                                    <input type="text" th:field="*{name}" placeholder="Dr. Jane Smith"
                                           class="w-full px-4 py-3 rounded-xl bg-slate-50 border-none focus:ring-2 focus:ring-teal-500 text-sm font-medium">
                                </div>

                                <!-- Specialization -->
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Specialization</label>
                                    <input type="text" th:field="*{specialization}" placeholder="e.g. Cardiology"
                                           class="w-full px-4 py-3 rounded-xl bg-slate-50 border-none focus:ring-2 focus:ring-teal-500 text-sm font-medium">
                                </div>

                                <!-- Years of Experience -->
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Years of Experience</label>
                                    <input type="text" th:field="*{yearsof_experience}" placeholder="e.g. 12 Years"
                                           class="w-full px-4 py-3 rounded-xl bg-slate-50 border-none focus:ring-2 focus:ring-teal-500 text-sm font-medium">
                                </div>

                                <!-- Status (ENUM Mapping) -->
                                <div class="md:col-span-2">
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Current Work Status</label>
                                    <div class="grid grid-cols-3 gap-4">
                                        <label class="relative flex items-center justify-center p-4 rounded-xl bg-slate-50 cursor-pointer border-2 border-transparent hover:bg-slate-100 transition-all has-[:checked]:border-teal-500 has-[:checked]:bg-teal-50">
                                            <input type="radio" th:field="*{status}" value="FREE" class="sr-only">
                                            <div class="text-center">
                                                <span class="block text-xl mb-1">✅</span>
                                                <span class="block text-xs font-bold text-slate-700">FREE</span>
                                            </div>
                                        </label>

                                        <label class="relative flex items-center justify-center p-4 rounded-xl bg-slate-50 cursor-pointer border-2 border-transparent hover:bg-slate-100 transition-all has-[:checked]:border-amber-500 has-[:checked]:bg-amber-50">
                                            <input type="radio" th:field="*{status}" value="BUSY" class="sr-only">
                                            <div class="text-center">
                                                <span class="block text-xl mb-1">⏳</span>
                                                <span class="block text-xs font-bold text-slate-700">BUSY</span>
                                            </div>
                                        </label>

                                        <label class="relative flex items-center justify-center p-4 rounded-xl bg-slate-50 cursor-pointer border-2 border-transparent hover:bg-slate-100 transition-all has-[:checked]:border-rose-500 has-[:checked]:bg-rose-50">
                                            <input type="radio" th:field="*{status}" value="ONLEAVE" class="sr-only">
                                            <div class="text-center">
                                                <span class="block text-xl mb-1">🏖️</span>
                                                <span class="block text-xs font-bold text-slate-700">ON LEAVE</span>
                                            </div>
                                        </label>
                                    </div>
                                </div>

                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="flex items-center justify-between">
                            <p class="text-xs text-slate-400 italic">Last profile update: Just now</p>
                            <div class="flex space-x-4">
                                <button type="button" class="px-6 py-2.5 rounded-full text-sm font-semibold text-slate-400 hover:text-slate-600 transition">Cancel</button>
                                <button type="submit" class="bg-teal-600 text-white px-10 py-3 rounded-full text-sm font-bold hover:bg-teal-700 transition shadow-lg shadow-teal-100">
                                    Update Profile
                                </button>
                            </div>
                        </div>

                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
