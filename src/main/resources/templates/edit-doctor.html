<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HealSync | Edit Specialist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-xl bg-white p-10 rounded-[3rem] shadow-xl shadow-slate-200/60 border border-slate-100">
        <header class="mb-8 text-center">
            <div class="inline-block p-4 rounded-full bg-rose-50 mb-4">
                <span class="text-3xl">🖋️</span>
            </div>
            <h2 class="text-3xl font-bold text-slate-800">Edit Specialist</h2>
            <p class="text-slate-500 mt-2">Modify credentials and personal information</p>
        </header>

        <!-- Form starts here -->
        <form th:action="@{/doctors/update/{id}(id=${doctor.id})}" th:object="${doctor}" method="post" class="space-y-6">
            
            <div class="grid grid-cols-2 gap-4">
                <!-- First Name -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">First Name</label>
                    <input type="text" th:field="*{user.firstName}" 
                           class="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-rose-500/10 focus:border-rose-500 outline-none transition-all font-medium">
                </div>
                <!-- Last Name -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Last Name</label>
                    <input type="text" th:field="*{user.lastName}" 
                           class="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-rose-500/10 focus:border-rose-500 outline-none transition-all font-medium">
                </div>
            </div>

            <!-- Email (Often kept as read-only for security, but editable here) -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Login Email</label>
                <input type="email" th:field="*{user.email}" 
                       class="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-rose-500/10 focus:border-rose-500 outline-none transition-all font-medium">
            </div>

            <!-- Specialization -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Area of Specialty</label>
                <input type="text" th:field="*{specialization}" 
                       class="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-rose-500/10 focus:border-rose-500 outline-none transition-all font-medium">
            </div>

            <!-- Experience -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Years of Experience</label>
                <input type="text" th:field="*{yearsofExperience}" 
                       class="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-rose-500/10 focus:border-rose-500 outline-none transition-all font-medium">
            </div>

            <!-- Action Buttons -->
            <div class="pt-6 flex flex-col sm:flex-row gap-3">
                <button type="submit" class="flex-1 bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-slate-800 hover:scale-[1.02] active:scale-95 transition-all">
                    Update Specialist
                </button>
                <a th:href="@{/doctors/manage}" class="flex-1 bg-slate-100 text-slate-600 text-center font-bold py-4 rounded-2xl hover:bg-slate-200 transition-all">
                    Cancel
                </a>
            </div>
        </form>
    </div>

</body>
</html>
