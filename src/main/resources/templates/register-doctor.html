<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealSync | Register Doctor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

    <div class="min-h-screen flex">
        <aside class="w-72 bg-white border-r border-slate-200 hidden md:flex flex-col">
            <div class="p-8">
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">HealSync<span class="text-rose-600">.</span>Admin</h1>
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <a th:href="@{/dashboard}" class="flex items-center px-4 py-3 text-sm font-medium text-slate-500 hover:bg-slate-50 rounded-2xl transition-all">
                    <span class="mr-3">⚙️</span> System Overview
                </a>
                <a th:href="@{/doctors}" class="flex items-center px-4 py-3 text-sm font-semibold bg-slate-900 text-white rounded-2xl transition-all">
                    <span class="mr-3">🩺</span> Manage Doctors
                </a>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <header class="px-10 py-8">
                <h2 class="text-3xl font-bold text-slate-800">Onboard Medical Staff</h2>
                <p class="text-slate-500 text-sm mt-1">Creating a new account linked to the Doctor role.</p>
            </header>

            <div class="px-10 pb-12">
                <form th:action="@{/doctors/register}" th:object="${user}" method="post" 
                      class="bg-white rounded-[2.5rem] p-10 border border-slate-100 shadow-sm max-w-3xl">
                    
                    <input type="hidden" name="role" value="DOCTOR">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        
                        <div class="space-y-2">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">First Name</label>
                            <input type="text" th:field="*{firstName}" required
                                   class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 outline-none transition-all"
                                   placeholder="Dr. John">
                        </div>

                        <div class="space-y-2">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Last Name</label>
                            <input type="text" th:field="*{lastName}" required
                                   class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 outline-none transition-all"
                                   placeholder="Smith">
                        </div>

                        <div class="space-y-2 md:col-span-2">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Professional Email</label>
                            <input type="email" th:field="*{email}" required
                                   class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 outline-none transition-all"
                                   placeholder="j.smith@healsync.com">
                        </div>

                        <div class="space-y-2 md:col-span-2">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Temporary Password</label>
                            <input type="password" th:field="*{password}" required
                                   class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 outline-none transition-all"
                                   placeholder="••••••••">
                            <p class="text-[10px] text-slate-400 mt-1 italic ml-1">Doctor will be prompted to change this upon first login.</p>
                        </div>
                    </div>

                    <div class="mt-10 flex items-center justify-end space-x-6 border-t border-slate-50 pt-8">
                        <a th:href="@{/dashboard}" class="text-sm font-bold text-slate-400 hover:text-slate-600 transition">Cancel</a>
                        <button type="submit" 
                                class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold shadow-xl shadow-slate-200 hover:bg-rose-600 hover:shadow-rose-100 transform hover:-translate-y-0.5 transition-all duration-200">
                            Create Doctor Account
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

</body>
</html>
