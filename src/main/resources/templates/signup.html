<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealSync | Join Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .medical-gradient {
            background: radial-gradient(circle at top right, #f0fdfa, #f8fafc);
        }
    </style>
</head>
<body class="medical-gradient flex items-center justify-center min-h-screen p-6">

    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-teal-50 rounded-full blur-3xl"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-96 h-96 bg-blue-50 rounded-full blur-3xl"></div>
    </div>

    <div class="bg-white/80 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200/50 border border-white w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-teal-600 tracking-tight">HealSync</h1>
            <h2 class="text-xl font-bold text-slate-800 mt-4">Create Account</h2>
            <p class="text-sm text-slate-500 mt-2">Join thousands of patients managing their health smarter.</p>
        </div>
        
        <form th:action="@{/signup}" th:object="${user}" method="post" class="space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5 ml-1">First Name</label>
                    <input type="text" th:field="*{firstName}" required
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 transition-all placeholder:text-slate-300"
                        placeholder="Jane">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5 ml-1">Last Name</label>
                    <input type="text" th:field="*{lastName}" required
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 transition-all placeholder:text-slate-300"
                        placeholder="Doe">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5 ml-1">Email Address</label>
                <input type="email" th:field="*{email}" required
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 transition-all placeholder:text-slate-300"
                    placeholder="jane@example.com">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5 ml-1">Password</label>
                <input type="password" th:field="*{password}" required
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 transition-all"
                    placeholder="••••••••">
            </div>

            <div class="pt-2">
                <button type="submit" 
                    class="w-full bg-teal-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-teal-200 hover:bg-teal-700 hover:shadow-teal-300 transform hover:-translate-y-0.5 transition-all duration-200">
                    Create Account
                </button>
            </div>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-50 text-center">
            <p class="text-sm text-slate-500">
                Already have an account? 
                <a th:href="@{/login}" class="text-teal-600 font-bold hover:text-teal-700 transition-colors ml-1">Login here</a>
            </p>
        </div>
    </div>

</body>
</html>
