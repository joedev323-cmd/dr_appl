<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealSync | Room Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

    <div class="min-h-screen flex">
        <aside class="w-72 bg-white border-r border-slate-200 hidden md:flex flex-col sticky top-0 h-screen">
            <div class="p-8">
                <h1 class="text-2xl font-bold text-teal-600 tracking-tight">HealSync</h1>
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <a th:href="@{/dashboard}" class="flex items-center px-4 py-3 text-sm font-medium text-slate-500 hover:bg-slate-50 hover:text-teal-600 rounded-2xl transition-all">
                    <span class="mr-3">📊</span> Dashboard
                </a>
                <a th:href="@{/appointmt}" class="flex items-center px-4 py-3 text-sm font-medium text-slate-500 hover:bg-slate-50 hover:text-teal-600 rounded-2xl transition-all">
                    <span class="mr-3">📅</span> Appointments
                </a>
                <a th:href="@{/doctors}" class="flex items-center px-4 py-3 text-sm font-medium text-slate-500 hover:bg-slate-50 hover:text-teal-600 rounded-2xl transition-all">
                    <span class="mr-3">🩺</span> Doctors
                </a>
                <a href="#" class="flex items-center px-4 py-3 text-sm font-semibold bg-teal-50 text-teal-700 rounded-2xl transition-all">
                    <span class="mr-3">🏥</span> Rooms
                </a>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="w-full flex items-center px-4 py-3 text-sm font-semibold text-rose-500 hover:bg-rose-50 rounded-2xl transition-all group">
                        <span class="mr-3 group-hover:scale-110 transition-transform">📤</span>
                        Sign Out
                    </button>
                </form>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <header class="flex justify-between items-center px-10 py-8">
                <div>
                    <h2 class="text-3xl font-bold text-slate-800">Facility Overview</h2>
                    <p class="text-slate-500 text-sm mt-1">Real-time status of consultation and surgery rooms.</p>
                </div>
                <div class="flex space-x-3">
                    <div class="flex items-center bg-white px-4 py-2 rounded-full border border-slate-200 text-xs font-bold text-slate-500 uppercase tracking-widest">
                        <span class="w-2 h-2 rounded-full bg-teal-500 mr-2 animate-pulse"></span>
                        Live Updates
                    </div>
                </div>
            </header>

            <div class="px-10 pb-12">
                <div class="flex flex-wrap gap-4 mb-8">
                    <div class="bg-white px-6 py-4 rounded-3xl shadow-sm border border-slate-100 flex items-center">
                        <span class="text-2xl mr-3">🛏️</span>
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Total Rooms</p>
                            <!-- <p class="text-lg font-bold text-slate-800" th:text="${#lists.size(room)}">24</p> -->
                        </div>
                    </div>
                    <div class="bg-white px-6 py-4 rounded-3xl shadow-sm border border-slate-100 flex items-center">
                        <span class="text-2xl mr-3 text-teal-500">●</span>
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Available</p>
                            <!-- <p class="text-lg font-bold text-slate-800" th:text="${vacantRooms}">18</p> -->
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    
                    <div th:each="rm : ${room}" class="bg-white rounded-[2rem] border border-slate-100 p-6 shadow-sm hover:shadow-md hover:border-teal-100 transition-all group">
                        <div class="flex justify-between items-start mb-6">
                            <div class="bg-slate-50 w-12 h-12 rounded-2xl flex items-center justify-center text-xl group-hover:bg-teal-50 transition-colors">
                                🚪
                            </div>
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider"
                                  th:classappend="${rm.isAvailable ? 'bg-teal-100 text-teal-700' : 'bg-rose-100 text-rose-700'}"
                                  th:text="${rm.isAvailable ? 'Available' : 'Occupied'}">
                                Available
                            </span>
                        </div>

                        <div>
                            <h3 class="text-xl font-bold text-slate-800" th:text="'Room ' + ${rm.room_id}">Room 101</h3>
                            <p class="text-sm text-slate-400 mt-1">General Consultation</p>
                        </div>

                        <div class="mt-6">
                            <div class="flex justify-between text-[10px] font-bold text-slate-400 uppercase mb-2">
                                <span>Daily Usage</span>
                                <span th:text="${rm.usagePercent + '%'}">40%</span>
                            </div>
                            <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                <div class="bg-teal-500 h-full transition-all duration-500" th:style="'width:' + ${rm.usagePercent} + '%'"></div>
                            </div>
                        </div>

                        <button class="w-full mt-6 py-3 bg-slate-50 text-slate-600 text-xs font-bold rounded-xl hover:bg-teal-600 hover:text-white transition-all opacity-0 group-hover:opacity-100">
                            View Schedule
                        </button>
                    </div>

                </div>
            </div>
        </main>
    </div>

</body>
</html>
