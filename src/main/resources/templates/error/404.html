<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealSync | Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .medical-grid {
            background-image: radial-gradient(#ccf2f4 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-slate-50 medical-grid flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full text-center">
        <div class="relative mb-8">
            <div class="text-[12rem] font-black text-teal-500/10 select-none">404</div>
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="bg-white p-6 rounded-[2rem] shadow-xl shadow-teal-100/50 border border-teal-50">
                    <span class="text-6xl">🩺</span>
                </div>
            </div>
        </div>

        <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Lost in the Clinic?</h1>
        <p class="text-slate-500 mt-4 leading-relaxed">
            We couldn't find the page you're looking for. It might have been moved, or perhaps the appointment was cancelled.
        </p>

        <div class="mt-10 space-y-3">
            <a href="/dashboard" 
               class="block w-full bg-teal-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-teal-200 hover:bg-teal-700 hover:shadow-teal-300 transform hover:-translate-y-0.5 transition-all duration-200">
                Back to Dashboard
            </a>
            <button onclick="window.history.back()" 
                    class="block w-full bg-white text-slate-600 py-4 rounded-2xl font-bold border border-slate-200 hover:bg-slate-50 transition-all">
                Go Back
            </button>
        </div>

        <p class="mt-8 text-sm text-slate-400">
            Believe this is an error? <a href="#" class="text-teal-600 font-semibold hover:underline">Contact Support</a>
        </p>
    </div>

</body>
</html>
