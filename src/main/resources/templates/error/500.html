<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealSync | System Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .medical-grid {
            background-image: radial-gradient(#ccf2f4 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-slow { animation: pulse-red 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-slate-50 medical-grid flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full text-center">
        <div class="relative mb-8">
            <div class="text-[12rem] font-black text-amber-500/10 select-none">500</div>
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="bg-white p-6 rounded-[2rem] shadow-xl shadow-amber-100/50 border border-amber-50">
                    <span class="text-6xl animate-pulse-slow">🏥</span>
                </div>
            </div>
        </div>

        <h1 class="text-3xl font-bold text-slate-800 tracking-tight">System Flatline</h1>
        <p class="text-slate-500 mt-4 leading-relaxed">
            Our servers are having a bit of a medical emergency. Our technical team is on the case and we'll be back online shortly.
        </p>

        <div class="mt-10 space-y-3">
            <button onclick="window.location.reload()" 
               class="block w-full bg-teal-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-teal-200 hover:bg-teal-700 transform hover:-translate-y-0.5 transition-all duration-200">
                Try Reconnecting
            </a>
            <a href="/status" 
                    class="block w-full bg-white text-slate-600 py-4 rounded-2xl font-bold border border-slate-200 hover:bg-slate-50 transition-all">
                Check System Status
            </a>
        </div>
    </div>

</body>
</html>
