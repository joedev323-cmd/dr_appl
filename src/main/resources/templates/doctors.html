<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealSync | Our Specialists</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

    <div class="min-h-screen flex">
        <aside class="w-72 bg-white border-r border-slate-200 hidden md:flex flex-col">
            <div class="p-8">
                <h1 class="text-2xl font-bold text-teal-600 tracking-tight">HealSync</h1>
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <a th:href="@{/dashboard}" class="flex items-center px-4 py-3 text-sm font-medium text-slate-500 hover:bg-slate-50 hover:text-teal-600 rounded-2xl transition-all">
                    <span class="mr-3">📊</span> Dashboard
                </a>
                <a th:href="@{/appointmt}" class="flex items-center px-4 py-3 text-sm font-medium text-slate-500 hover:bg-slate-50 hover:text-teal-600 rounded-2xl transition-all">
                    <span class="mr-3">📅</span> Appointments
                </a>
                <a href="#" class="flex items-center px-4 py-3 text-sm font-semibold bg-teal-50 text-teal-700 rounded-2xl transition-all">
                    <span class="mr-3">🩺</span> Doctors
                </a>
                <a th:href="@{/rooms}" class="flex items-center px-4 py-3 text-sm font-medium text-slate-500 hover:bg-slate-50 hover:text-teal-600 rounded-2xl transition-all">
                    <span class="mr-3">🏥</span> Rooms
                </a>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <header class="flex justify-between items-center px-10 py-8">
                <div>
                    <h2 class="text-3xl font-bold text-slate-800">Our Specialists</h2>
                    <p class="text-slate-500 text-sm mt-1">Manage and view all registered healthcare providers.</p>
                </div>
                
                <div class="flex items-center space-x-4">
                    <div class="relative">
                        <input type="text" placeholder="Search doctors..." 
                               class="pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 transition-all">
                        <span class="absolute left-3 top-2.5 text-slate-400">🔍</span>
                    </div>
                    <button class="bg-teal-600 text-white px-6 py-2.5 rounded-full text-sm font-semibold hover:bg-teal-700 transition shadow-lg shadow-teal-200">
                        + Add New Doctor
                    </button>
                </div>
            </header>

            <div class="px-10 pb-12">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    
                    <div th:each="doc : ${doctors}" class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 hover:shadow-md transition-all group">
                        <div class="flex flex-col items-center text-center">
                            <div class="w-24 h-24 rounded-full bg-teal-50 flex items-center justify-center mb-4 ring-4 ring-slate-50 group-hover:ring-teal-100 transition-all">
                                <span class="text-3xl font-bold text-teal-600" th:text="${doc.name.substring(0,1)}">D</span>
                            </div>
                            
                            <h3 class="text-lg font-bold text-slate-800" th:text="${'Dr. ' + doc.name}">Dr. Sarah Jenkins</h3>
                            <span class="px-3 py-1 bg-teal-100 text-teal-700 text-[10px] font-bold uppercase rounded-full mt-2" 
                                  th:text="${doc.specialization}">Cardiologist</span>
                            
                            <div class="mt-6 w-full grid grid-cols-2 border-t border-slate-50 pt-4 gap-2">
                                <div class="text-center">
                                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Experience</p>
                                    <p class="text-sm font-semibold text-slate-700">8 Years</p>
                                </div>
                                <div class="text-center border-l border-slate-50">
                                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Rating</p>
                                    <p class="text-sm font-semibold text-teal-600">★ 4.9</p>
                                </div>
                            </div>

                            <div class="mt-6 flex space-x-2 w-full">
                                <button class="flex-1 py-2.5 bg-slate-50 text-slate-600 text-xs font-bold rounded-xl hover:bg-slate-100 transition">Profile</button>
                                <button class="flex-1 py-2.5 bg-teal-600 text-white text-xs font-bold rounded-xl hover:bg-teal-700 transition">Schedule</button>
                            </div>
                        </div>
                    </div>

                    <div th:if="${#lists.isEmpty(doctors)}" class="bg-white p-6 rounded-[2.5rem] border border-dashed border-slate-300 flex flex-col items-center justify-center text-slate-400 h-64">
                        <p>No doctors found.</p>
                    </div>

                </div>
            </div>
        </main>
    </div>

</body>
</html>
