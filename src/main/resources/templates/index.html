<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title></title>
</head>

<body>
 <form th:action="@{/book}" th:object="${appointment}" method="post" class="booking-form">
  <fieldset>
    <label for="doctor">Doctor</label>
    <select id="doctor" th:field="*{doctor}" >
      <option value="">Choose a doctor</option>
      <option th:each="doc : ${doctors}"
              th:value="${doc.id}"
              th:text="${doc.name} + ' — ' + ${doc.specialization}">Doc</option>
    </select>
    <small class="helper">Select a provider and their specialty.</small>
  </fieldset>

  <fieldset>
    <label for="room">Room</label>
    <select id="room" th:field="*{room}" >
      <option value="">Choose a room</option>
      <option th:each="rm : ${room}"
              th:value="${rm.room_id}"
              th:text="'Room #' + ${rm.room_id}">Room</option>
    </select>
  </fieldset>

  <fieldset>
    <label for="timeSlot">Time slot</label>
    <select id="timeSlot" name="timeSlot" >
      <option value="">Choose a time</option>
      <option th:each="slot : ${Slots}"
              th:value="${slot}"
              th:text="${slot}">Slot</option>
    </select>
  </fieldset>

  <button type="submit" class="primary">Book appointment</button>
</form>

</body>
</html>
