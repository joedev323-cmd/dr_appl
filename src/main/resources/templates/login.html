<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealSync | Welcome Back</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .medical-gradient {
            background: radial-gradient(circle at bottom left, #f0fdfa, #f8fafc);
        }
    </style>
</head>
<body class="medical-gradient flex items-center justify-center min-h-screen p-6">

    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute bottom-[-5%] right-[-5%] w-80 h-80 bg-teal-50 rounded-full blur-3xl"></div>
        <div class="absolute top-[10%] left-[-5%] w-64 h-64 bg-blue-50 rounded-full blur-3xl"></div>
    </div>

    <div class="bg-white/80 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200/50 border border-white w-full max-w-md">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-teal-600 tracking-tight">HealSync</h1>
            <h2 class="text-xl font-bold text-slate-800 mt-4">Welcome Back</h2>
            <p class="text-sm text-slate-500 mt-2">Log in to manage your health and appointments.</p>
        </div>
        
        <form th:action="@{/login}" method="post" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Email Address</label>
                <div class="relative group">
                    <input type="email" name="username" required
                        class="w-full px-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 transition-all placeholder:text-slate-300"
                        placeholder="name@example.com">
                </div>
            </div>

            <div>
                <div class="flex justify-between mb-2 ml-1">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider">Password</label>
                    <a href="#" class="text-xs font-semibold text-teal-600 hover:text-teal-700 transition-colors">Forgot?</a>
                </div>
                <div class="relative group">
                    <input type="password" name="password" required
                        class="w-full px-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 transition-all placeholder:text-slate-300"
                        placeholder="••••••••">
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" 
                    class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-lg shadow-slate-200 hover:bg-teal-600 hover:shadow-teal-100 transform hover:-translate-y-0.5 transition-all duration-200">
                    Sign In
                </button>
            </div>
        </form>

        <div class="mt-10 pt-6 border-t border-slate-50 text-center">
            <p class="text-sm text-slate-500">
                Don't have an account? 
                <a th:href="@{/signup}" class="text-teal-600 font-bold hover:text-teal-700 transition-colors ml-1">Create one</a>
            </p>
        </div>
    </div>

</body>
</html>
